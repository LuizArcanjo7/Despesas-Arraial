<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas Arraial</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">💸 Despesas Arraial</h1>

        <div class="mb-8 p-4 bg-gray-50 rounded border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">🛒 Nova Despesa</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Descrição (ex: Cerveja, Carne)</label>
                    <input type="text" id="desc" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="O que foi comprado?">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Valor Total (R$)</label>
                    <input type="number" id="valor" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="0.00" step="0.01">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Quem pagou?</label>
                <select id="pagador" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-400 outline-none"></select>
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium">Dividir entre:</label>
                    <div class="flex items-center space-x-2 text-sm font-bold text-blue-600 hover:bg-blue-50 p-1 rounded transition">
                        <input type="checkbox" id="chk-todos" class="w-5 h-5 rounded cursor-pointer accent-blue-600">
                        <label for="chk-todos" class="cursor-pointer select-none">Dividir para todos</label>
                    </div>
                </div>
                <div id="consumidores" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 border-t pt-3"></div>
            </div>

            <button id="btn-salvar" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 transition text-lg">
                Adicionar Despesa
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-1">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">📋 Histórico Lançado</h2>
                <ul id="lista-despesas" class="space-y-3"></ul>
            </div>
            
            <div class="md:col-span-1">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2 text-blue-700">🔄 Transferências Pendentes</h2>
                <ul id="lista-acertos" class="space-y-3 font-medium"></ul>
            </div>

            <div class="md:col-span-1">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2 text-gray-700">💰 Saldo de Cada Um</h2>
                <ul id="lista-saldos" class="space-y-2 text-sm font-medium"></ul>
            </div>
        </div>

        <div class="p-4 bg-indigo-50 rounded border border-indigo-200">
            <h2 class="text-xl font-semibold mb-4 text-indigo-800">🔑 Chaves PIX da Galera</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-sm font-bold text-indigo-600 mb-2">Cadastre a sua chave:</h3>
                    <div class="space-y-3">
                        <select id="pix-nome" class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-400 outline-none"></select>
                        
                        <div class="flex gap-2">
                            <select id="pix-tipo" class="border rounded p-2 focus:ring-2 focus:ring-indigo-400 outline-none w-1/3">
                                <option value="Celular">Celular</option>
                                <option value="CPF">CPF</option>
                                <option value="E-mail">E-mail</option>
                                <option value="Aleatória">Aleatória</option>
                            </select>
                            <input type="text" id="pix-chave" class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-400 outline-none w-2/3" placeholder="Sua chave PIX">
                        </div>
                        
                        <button id="btn-salvar-pix" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition">
                            Salvar Chave PIX
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-indigo-600 mb-2">Chaves Cadastradas:</h3>
                    <ul id="lista-chaves-pix" class="space-y-2 text-sm bg-white p-3 rounded border">
                        <li class="text-gray-400 italic">Carregando chaves...</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCPBVS177muDRevsEdAnOnYMnfl-eek6lY",
            authDomain: "despesas-marinhos.firebaseapp.com",
            projectId: "despesas-marinhos",
            storageBucket: "despesas-marinhos.firebasestorage.app",
            messagingSenderId: "24330037755",
            appId: "1:24330037755:web:cf9a7e835c43226c6cc35e",
            measurementId: "G-ZPJJPJ0EFE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const pessoas = [
            "Luana", "Luiz", "Mimi", "Marlene", "Fernando", 
            "Rose", "Victor", "Vovó Silvia", "Vovó Maria", "Vovó Fabi", 
            "Vovô Roger", "Lara", "Guilherme", "Lorena", "Valdir"
        ];

        const pagadorSelect = document.getElementById('pagador');
        const pixNomeSelect = document.getElementById('pix-nome');
        const consumidoresDiv = document.getElementById('consumidores');
        const chkTodos = document.getElementById('chk-todos');

        // Preenche as listas garantindo suporte perfeito para toque no celular
        pessoas.forEach((nome, index) => {
            let optPagador = document.createElement('option');
            optPagador.value = nome;
            optPagador.textContent = nome;
            pagadorSelect.appendChild(optPagador);

            let optPix = document.createElement('option');
            optPix.value = nome;
            optPix.textContent = nome;
            pixNomeSelect.appendChild(optPix);

            // Novo formato de Checkbox à prova de falhas
            const chkId = `chk-${index}`;
            const div = document.createElement('div');
            div.className = "flex items-center space-x-2 text-sm";
            div.innerHTML = `
                <input type="checkbox" id="${chkId}" value="${nome}" class="consumidor-chk w-5 h-5 rounded cursor-pointer accent-blue-600"> 
                <label for="${chkId}" class="cursor-pointer select-none">${nome}</label>
            `;
            consumidoresDiv.appendChild(div);
        });

        // Lógica do botão "Dividir para todos" atualizada
        chkTodos.addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.consumidor-chk');
            checkboxes.forEach(chk => { chk.checked = e.target.checked; });
        });

        consumidoresDiv.addEventListener('change', (e) => {
            if (e.target.classList.contains('consumidor-chk')) {
                const totalCheckboxes = document.querySelectorAll('.consumidor-chk').length;
                const marcados = document.querySelectorAll('.consumidor-chk:checked').length;
                chkTodos.checked = (totalCheckboxes === marcados);
            }
        });

        let despesasGlobais = []; 
        let chavesPixGlobais = {}; 

        document.getElementById('btn-salvar').addEventListener('click', async () => {
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const pagador = document.getElementById('pagador').value;
            const chks = document.querySelectorAll('.consumidor-chk:checked');
            const consumidores = Array.from(chks).map(chk => chk.value);

            if (!desc || isNaN(valor) || consumidores.length === 0) {
                return alert("Preencha a descrição, o valor e selecione pelo menos um consumidor!");
            }

            // Desabilita o botão para evitar clique duplo
            document.getElementById('btn-salvar').disabled = true;
            document.getElementById('btn-salvar').innerText = "Salvando...";

            try {
                await addDoc(collection(db, "despesas"), {
                    desc: desc, valor: valor, pagador: pagador, consumidores: consumidores, data: new Date(), tipo: "despesa"
                });
                document.getElementById('desc').value = '';
                document.getElementById('valor').value = '';
                document.querySelectorAll('.consumidor-chk').forEach(chk => chk.checked = false);
                chkTodos.checked = false; 
            } catch (error) {
                alert("Erro ao salvar. Tente novamente.");
            } finally {
                document.getElementById('btn-salvar').disabled = false;
                document.getElementById('btn-salvar').innerText = "Adicionar Despesa";
            }
        });

        const q = query(collection(db, "despesas"), orderBy("data", "desc"));
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('lista-despesas');
            lista.innerHTML = '';
            despesasGlobais = [];

            snapshot.forEach((documento) => {
                const d = documento.data();
                const idDespesa = documento.id;
                despesasGlobais.push(d);
                
                if (d.tipo === "pagamento") {
                    lista.innerHTML += `
                        <li class="bg-green-100 p-3 rounded border border-green-300 text-sm shadow-sm relative pr-10">
                            <strong>${d.desc}</strong> - R$ ${d.valor.toFixed(2)}<br>
                            <span class="text-green-800 text-xs mt-1 block">De: ${d.pagador} ➡️ Para: ${d.consumidores[0]}</span>
                            <button data-id="${idDespesa}" class="btn-excluir absolute top-2 right-3 text-red-500 hover:text-red-700 font-bold text-lg" title="Cancelar pagamento">✕</button>
                        </li>
                    `;
                } else {
                    const textoConsumidores = d.consumidores.length === pessoas.length ? "Todos" : d.consumidores.join(', ');
                    lista.innerHTML += `
                        <li class="bg-gray-50 p-3 rounded border text-sm shadow-sm relative pr-10">
                            <strong>${d.desc}</strong> - R$ ${d.valor.toFixed(2)}<br>
                            <span class="text-gray-600">Pago por: <strong>${d.pagador}</strong></span><br>
                            <span class="text-gray-500 text-xs mt-1 block">Consumido por: ${textoConsumidores}</span>
                            <button data-id="${idDespesa}" class="btn-excluir absolute top-2 right-3 text-red-500 hover:text-red-700 font-bold text-lg" title="Apagar despesa">✕</button>
                        </li>
                    `;
                }
            });

            document.querySelectorAll('.btn-excluir').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(confirm("Tem certeza que deseja cancelar este item? Os valores serão recalculados.")) {
                        await deleteDoc(doc(db, "despesas", e.target.getAttribute('data-id')));
                    }
                });
            });

            calcularAcertosESaldos();
        });


        // Salvar Chave PIX
        document.getElementById('btn-salvar-pix').addEventListener('click', async () => {
            const nome = document.getElementById('pix-nome').value;
            const tipo = document.getElementById('pix-tipo').value;
            const chave = document.getElementById('pix-chave').value.trim();

            if (!chave) return alert("Por favor, digite a chave PIX!");

            document.getElementById('btn-salvar-pix').disabled = true;
            await setDoc(doc(db, "pix_keys", nome), { tipo: tipo, chave: chave });
            document.getElementById('btn-salvar-pix').disabled = false;
            
            document.getElementById('pix-chave').value = '';
            alert(`Chave PIX de ${nome} salva com sucesso!`);
        });

        // Escutar Chaves PIX em Tempo Real
        onSnapshot(collection(db, "pix_keys"), (snapshot) => {
            const listaPix = document.getElementById('lista-chaves-pix');
            listaPix.innerHTML = '';
            chavesPixGlobais = {};

            if(snapshot.empty) {
                listaPix.innerHTML = '<li class="text-gray-400 italic">Nenhuma chave cadastrada ainda.</li>';
            }

            snapshot.forEach((documento) => {
                const nome = documento.id;
                const dados = documento.data();
                chavesPixGlobais[nome] = dados;

                listaPix.innerHTML += `
                    <li class="border-b border-gray-100 last:border-0 pb-1 last:pb-0">
                        <span class="font-bold text-gray-700">${nome}:</span> 
                        <span class="text-indigo-600 select-all">${dados.chave}</span> 
                        <span class="text-xs text-gray-400">(${dados.tipo})</span>
                    </li>
                `;
            });

            calcularAcertosESaldos();
        });

        // MOTOR DE CÁLCULO COM PROTEÇÃO CONTRA DADOS ANTIGOS (NaN FIX)
        function calcularAcertosESaldos() {
            let saldos = {};
            // Inicia zerado apenas para as pessoas que estão na lista atual
            pessoas.forEach(p => saldos[p] = 0);

            despesasGlobais.forEach(d => {
                // Proteção: se existir um nome velho no banco, inicializa em 0 para não quebrar a matemática
                if (saldos[d.pagador] === undefined) saldos[d.pagador] = 0;
                
                if (d.consumidores && d.consumidores.length > 0) {
                    const valorPorPessoa = d.valor / d.consumidores.length;
                    saldos[d.pagador] += d.valor; 
                    
                    d.consumidores.forEach(c => {
                        // Proteção contra nome velho de consumidor
                        if (saldos[c] === undefined) saldos[c] = 0;
                        saldos[c] -= valorPorPessoa; 
                    });
                }
            });

            const listaSaldos = document.getElementById('lista-saldos');
            listaSaldos.innerHTML = '';
            
            // Exibe o saldo apenas para quem está na lista atual
            pessoas.forEach(p => {
                let valor = saldos[p] || 0; // Se der algum erro bizarro, força para 0
                if (valor > 0.01) {
                    listaSaldos.innerHTML += `<li class="flex justify-between items-center p-2 bg-green-50 rounded border border-green-100"><span class="font-bold">${p}</span> <span class="text-green-600">+ R$ ${valor.toFixed(2)}</span></li>`;
                } else if (valor < -0.01) {
                    listaSaldos.innerHTML += `<li class="flex justify-between items-center p-2 bg-red-50 rounded border border-red-100"><span class="font-bold">${p}</span> <span class="text-red-600">- R$ ${Math.abs(valor).toFixed(2)}</span></li>`;
                } else {
                    listaSaldos.innerHTML += `<li class="flex justify-between items-center p-2 bg-gray-50 rounded border border-gray-100 text-gray-400"><span>${p}</span> <span>R$ 0.00</span></li>`;
                }
            });

            let devedores = [];
            let credores = [];
            for (let p in saldos) {
                if (saldos[p] && saldos[p] < -0.01) devedores.push({ nome: p, valor: Math.abs(saldos[p]) });
                if (saldos[p] && saldos[p] > 0.01) credores.push({ nome: p, valor: saldos[p] });
            }

            const listaAcertos = document.getElementById('lista-acertos');
            listaAcertos.innerHTML = '';
            
            let i = 0, j = 0;
            while (i < devedores.length && j < credores.length) {
                let dev = devedores[i];
                let cred = credores[j];
                let valorAcerto = Math.min(dev.valor, cred.valor);

                let infoPix = '';
                if(chavesPixGlobais[cred.nome]) {
                    infoPix = `<div class="text-xs mt-1 bg-white p-1 rounded border border-blue-100 text-gray-600">
                                  Chave PIX (${chavesPixGlobais[cred.nome].tipo}): 
                                  <span class="font-bold text-black cursor-text select-all">${chavesPixGlobais[cred.nome].chave}</span>
                               </div>`;
                } else {
                    infoPix = `<div class="text-xs mt-1 text-red-400 italic">PIX não cadastrado</div>`;
                }

                listaAcertos.innerHTML += `
                    <li class="p-3 bg-blue-50 text-blue-900 rounded border border-blue-200 shadow-sm flex flex-col gap-2">
                        <div class="text-sm">
                            <strong>${dev.nome}</strong> deve 
                            <span class="font-bold text-red-600">R$ ${valorAcerto.toFixed(2)}</span> 
                            para <strong>${cred.nome}</strong>
                            ${infoPix}
                        </div>
                        <button class="btn-dar-baixa bg-green-500 text-white text-xs font-bold py-1 px-2 rounded hover:bg-green-600 transition self-start flex items-center gap-1"
                                data-dev="${dev.nome}" data-cred="${cred.nome}" data-val="${valorAcerto.toFixed(2)}">
                            ✔️ Dar Baixa (Pago)
                        </button>
                    </li>
                `;

                dev.valor -= valorAcerto;
                cred.valor -= valorAcerto;

                if (dev.valor < 0.01) i++;
                if (cred.valor < 0.01) j++;
            }

            if(listaAcertos.innerHTML === '') {
                listaAcertos.innerHTML = "<li class='text-gray-500 italic p-3 text-center'>Tudo quite! 🍻</li>";
            }
        }
    </script>
</body>
</html>
